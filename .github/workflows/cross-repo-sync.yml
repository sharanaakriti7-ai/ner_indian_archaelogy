name: Cross-Repo Sync

on:
  workflow_dispatch:
    inputs:
      direction:
        description: 'Sync direction'
        required: true
        default: 'dataset-to-code'
        type: choice
        options:
          - dataset-to-code
          - code-to-dataset

  schedule:
    # Weekly sync on Monday at 9 AM
    - cron: '0 9 * * MON'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Sync Dataset (Pull Latest)
        run: |
          echo "Checking for dataset updates..."
          if [ -d "data" ]; then
            cd data
            git status
            cd ..
          else
            echo "Dataset directory not found"
          fi

      - name: Commit if changes
        continue-on-error: true
        run: |
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Sync: Dataset updated from dataset-repo"
            echo "Changes committed"
          else
            echo "No dataset changes to commit"
          fi

      - name: Push changes
        continue-on-error: true
        run: |
          git push origin ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    runs-on: ubuntu-latest
    needs: sync
    if: always()
    
    steps:
      - name: Status
        run: |
          echo "Cross-repo sync completed"
          if [ "${{ needs.sync.result }}" == "success" ]; then
            echo "✓ Sync successful"
          else
            echo "⚠ Sync completed with warnings"
          fi
